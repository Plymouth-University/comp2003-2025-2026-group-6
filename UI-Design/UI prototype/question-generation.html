<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Generate Questions – Capture the Flag</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .screen {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 72px);
    }

    .bg-circuit,
    .bg-sprites,
    .top-flags,
    .fox-mascot {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .bg-circuit {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.16;
      z-index: 0;
    }

    .bg-sprites {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      z-index: 1;
    }

    .top-flags {
      width: 360px;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .fox-mascot {
      width: 185px;
      right: 60px;
      top: 100px;
      z-index: 2;
    }

    .welcomeCard,
    #container,
    #addButton,
    #editButton {
      position: relative;
      z-index: 5;
    }

    .generate-card {
      max-width: 900px;
      margin: 140px auto 0;
    }

    .confirm-btn {
      display: block;
      margin: 30px auto 0;
      font-size: 22px;
      padding: 18px 40px;
    }

    #topic {
      width: 100%;
      max-width: 650px;
      display: block;
      margin: 20px auto;
      padding: 16px;
      font-size: 18px;
      border: 4px solid #000;
      border-radius: 10px;
      resize: vertical;
    }

    #file-input {
      display: block;
      margin: 20px auto;
      font-size: 16px;
    }

    #loading {
      text-align: center;
      font-size: 20px;
      margin-top: 24px;
    }

    #container {
      max-width: 950px;
      margin: 30px auto;
    }

    #addButton,
    #editButton {
      margin: 20px 10px 50px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 800;
      border: 4px solid #000;
      border-radius: 10px;
      cursor: pointer;
    }

    #addButton {
      margin-left: calc(50% - 150px);
      background: #ff9800;
      color: white;
    }

    #editButton {
      background: #4caf50;
      color: white;
    }

    @media (max-width: 1000px) {
      .fox-mascot {
        width: 145px;
        right: 10px;
        top: 90px;
        opacity: 0.9;
      }

      .top-flags {
        width: 250px;
      }
    }

    @media (max-width: 700px) {
      .fox-mascot {
        display: none;
      }

      .top-flags {
        width: 210px;
      }

      .generate-card {
        margin-top: 130px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="tabs" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="windowBtns" aria-hidden="true">
        <i></i><i></i><i></i>
      </div>
    </header>

    <main class="screen">

      <img src="assets/background_circuit_blobs.svg" class="bg-circuit" alt="">
      <img src="assets/login_decor_sprites.svg" class="bg-sprites" alt="">
      <img src="assets/floating_flags.svg" class="top-flags" alt="">
      <img src="assets/side_mascot_hacker_fox.svg" class="fox-mascot" alt="">

      <section class="welcomeCard generate-card">
        <h2 style="margin-top:0; font-size:36px; font-weight:900; text-align:center;">
          Generate Questions
        </h2>

        <p class="welcomeText" style="text-align:center; font-size:20px; margin:20px 0;">
          Input your topic of choice and press generate:
        </p>

        <textarea id="topic" rows="4" placeholder="Enter topic..."></textarea>

        <button id="generateBtn" class="startBig confirm-btn" disabled>
          Generate
        </button>

        <h2 id="loading" style="visibility:hidden;">
          Questions are generating - this could take a minute...
        </h2>

        <p class="welcomeText" style="text-align:center; font-size:20px; margin:20px 0;">
          Or upload question pack:
        </p>

        <input type="file" id="file-input" accept=".json">
      </section>

      <template id="itemTemplate">
        <div id="qNum">Q</div>
        <div class="item">
          <textarea id="Q" rows="1" cols="100"></textarea>
        </div>

        <div id="aNum">A</div>
        <textarea id="A" rows="2" cols="40"></textarea>
        <textarea id="B" rows="2" cols="40"></textarea>
        <textarea id="C" rows="2" cols="40"></textarea>
        <textarea id="D" rows="2" cols="40"></textarea>

        <div id="cNum">C</div>
        <div class="item">
          <textarea id="Correct" rows="1" cols="100"></textarea>
        </div>

        <br><br>
      </template>

      <div id="container"></div>

      <button id="addButton">Add Question</button>
      <button id="editButton">Save</button>
    </main>
  </div>

  <script>
    const getTopic = document.getElementById("topic");
    const generateBtn = document.getElementById("generateBtn");

    getTopic.addEventListener("input", () => {
      generateBtn.disabled = getTopic.value.trim() === "";
    });
  </script>

  <script type="module" src="question-generation.js"></script>
</body>
</html>
