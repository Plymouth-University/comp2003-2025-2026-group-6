<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Generate Questions – Capture the Flag</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .confirm-btn {
            display: block;
            margin: 30px auto 0;
            font-size: 22px;
            padding: 18px 40px;
        }
    </style>
</head>

<body>
    <div class="app">
        <header class="topbar">
            <div class="tabs" aria-hidden="true">
                <span></span><span></span><span></span><span></span>
            </div>
            <div class="windowBtns" aria-hidden="true">
                <i></i><i></i><i></i>
            </div>
        </header>

        <main class="screen">
            <section class="welcomeCard" style="max-width: 900px; margin: 100px auto 0;">
                <h2 style="margin-top:0; font-size:36px; font-weight:900; text-align:center;">
                    Generate Questions
                </h2>

                <p class="welcomeText" style="text-align:center; font-size:20px; margin:20px 0;">
                    Input your topic of choice and press generate:
                </p>

                <textarea id="topic" rows="4" cols="50" placeholder="Enter topic..."></textarea><br>

                <button id="generateBtn" class="startBig confirm-btn" disabled onclick="sendTopic()">
                    Generate
                </button>

            </section>
            <!-- Temporery Question Generation -->
            <h2>Response:</h2>
            <pre id="response"></pre>
        </main>
    </div>

    <script>

        //Button activation
        const getTopic = document.getElementById("topic")
        const getGnerateButton = document.getElementById("generateBtn")
        getTopic.addEventListener('input', () => {
            generateBtn.disabled = false
            if (getTopic.value.trim() === "") {
                generateBtn.disabled = true;
            }
        });

        async function sendTopic() {
            const topic = document.getElementById("topic").value;
            const responseBox = document.getElementById("response");
            responseBox.textContent = ""; // Clear previous output

            const res = await fetch("http://localhost:3000/api/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic })
            });

            // STREAM the AI output
            const reader = res.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                responseBox.textContent += decoder.decode(value);
            }
        }
    </script>
</body>
</html>
