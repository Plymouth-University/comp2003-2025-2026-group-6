<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Game – Capture the Flag</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { overflow-x: hidden; scroll-behavior: smooth; background: #0a0a1a; }
    /* Simple styling for the quiz buttons since we are restoring everything */
    .option-btn {
      padding: 14px;
      font-size: 18px;
      background: #f0f0f0;
      border: 3px solid #000;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .option-btn:hover { background: #e0e0e0; }

    .disabled-correct:disabled {
      background-color: green;
      color: white;
    }
    .disabled-incorrect:disabled {
      background-color: red;
      color: white;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="tabs" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      <div class="windowBtns" aria-hidden="true"><i></i><i></i><i></i></div>
    </header>

    <main class="screen">
      <h2 style="text-align:center; color:white; margin:20px; font-size: 2.5em;">Capture the Flag</h2>
      
      <div style="text-align:center; color:white; margin:10px;">
        Welcome, <strong id="playerNameDisplay">Player</strong>!
      </div>

      <div style="text-align:center; color:white; margin:10px; font-size:1.2em;">
        Session PIN: <strong id="sessionPinDisplay">??????</strong>
      </div>

      <div style="max-width:1140px; margin:0 auto; padding:20px;">
        
        <div style="margin-bottom:15px; text-align:center;">
          <button id="startBtnGame" class="startBig">Start</button>
          <button id="pauseBtn">Pause</button>
          <button id="resetBtn">Reset</button>
        </div>

        <div style="text-align:center; color:#e0f7ff; margin:10px; font-size:1.2em;">
          Team: <strong id="teamDisplay">A</strong> | 
          Role: <strong id="roleDisplay">Scout</strong>
        </div>

        <div style="text-align:center;">
          <iframe id="unityIframe" src="stacker_game/index.html" scrolling="no" style="width:100%; max-width:1100px; height:700px; border:4px solid #000; background:#222; border-radius:8px; display:block; margin:0 auto;"></iframe>
        </div>

        <div style="margin-top: 20px; padding: 20px; background: rgba(20, 20, 40, 0.8); border: 2px solid #333; border-radius: 10px; color: #e0f7ff; max-width: 800px; margin-left: auto; margin-right: auto;">
          <p style="margin: 8px 0; font-size: 1.4em;">
            Time left: <span id="timeLeft" style="color: #fffb99; font-weight: bold;">60</span>s
          </p>
          
          <p id="status" style="color: #ffd700; font-weight: bold; font-size: 1.3em; margin: 12px 0;">
            Initializing Systems...
          </p>
          
          <p style="margin: 8px 0;">
            Team A Score: <span id="scoreA" style="color: #00ff9d; font-weight: bold;">0</span> 
            | Team B Score: <span id="scoreB" style="color: #ff5e5e; font-weight: bold;">0</span>
          </p>
          
          <p style="margin: 12px 0;">
            Stamina: 
            <progress id="stamina" max="100" value="100" style="width: 220px; height: 18px;"></progress>
          </p>
        </div>
      </div>

      <div id="questionModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:white; padding:40px; border:6px solid #000; border-radius:20px; max-width:550px; width:90%; text-align:center; box-shadow:0 0 50px rgba(0,255,157,0.3);">
            <h3 id="questionText" style="margin:0 0 25px; font-size:28px; color:#1a1a1a; font-family: sans-serif;">Security Challenge</h3>
            <div id="optionsContainer" style="display:flex; flex-direction:column; gap:15px; margin-bottom:20px;">
              </div>
        </div>
      </div>

      <div id="resultsScreen" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; color: white; text-align: center; padding: 40px;">
        <div style="max-width: 700px; margin: 0 auto; border: 6px solid #ffd700; border-radius: 20px; padding: 40px; background: #111;">
          <h1 style="font-size: 3em; color: #ffd700;">GAME OVER</h1>
          <div style="display:flex; justify-content: space-around; margin: 40px 0;">
            <div><h2>Team A</h2><p id="finalScoreA" style="font-size: 3em;">0</p></div>
            <div><h2>Team B</h2><p id="finalScoreB" style="font-size: 3em;">0</p></div>
          </div>
          <button onclick="location.reload()" style="padding: 15px 40px; font-size: 20px; cursor: pointer;">Play Again</button>
        </div>
      </div>

    </main>
  </div>

  <script type="module" src="game.js"></script>

  <script>
    // Load local storage data
    document.getElementById("playerNameDisplay").textContent = localStorage.getItem("playerName") || "Player";
    document.getElementById("sessionPinDisplay").textContent = localStorage.getItem("sessionPin") || "N/A";
    document.getElementById("teamDisplay").textContent = localStorage.getItem("team") || "A";
    document.getElementById("roleDisplay").textContent = localStorage.getItem("role") || "Scout";

    let hackTimer;
    let timeLeft;
    const timerEl = document.getElementById("timeLeft");
    const statusEl = document.getElementById("status");
    const iframe = document.getElementById("unityIframe");

    // START BUTTON LOGIC
    document.getElementById("startBtnGame").addEventListener("click", function() {
      // Get the time (including the quiz bonus) from the UI
      timeLeft = parseInt(timerEl.textContent);
      
      clearInterval(hackTimer);
      statusEl.textContent = "HACK IN PROGRESS...";
      statusEl.style.color = "#00ff9d";

      iframe.focus();
      
      hackTimer = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(hackTimer);
          statusEl.textContent = "TIME EXPIRED!";
          statusEl.style.color = "#ff5e5e";
          // Trigger results screen
          document.getElementById("resultsScreen").style.display = "block";
          document.getElementById("finalScoreA").textContent = document.getElementById("scoreA").textContent;
          document.getElementById("finalScoreB").textContent = document.getElementById("scoreB").textContent;
        }
      }, 1000);
    });

    // Unity Message Listener
    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === "STACKER_GAME_OVER") {
        clearInterval(hackTimer);
        const finalScore = event.data.score;
        // Dispatch event for game.js to catch and send to Firebase
        document.dispatchEvent(new CustomEvent('unityGameOver', { detail: { score: finalScore } }));
      }
    });

    window.addEventListener("message", function(event) {
    if (event.data?.type === "START_GAME") {
        const time = event.data.time;

        unityInstance.SendMessage(
            'GameManager',
            'StartGame',
            String(time)
        );
    }
});
  </script>
</body>
</html>
