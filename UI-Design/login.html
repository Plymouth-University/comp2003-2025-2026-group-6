<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Log In – Capture the Flag</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      border: 3px solid #000;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      margin: 20px auto;
      transition: all 0.2s;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    }

    .google-btn img {
      width: 26px;
      height: 26px;
    }

    #statusMsg {
      font-size: 15px;
      color: #c00;
      min-height: 22px;
      margin: 8px 0;
    }

    .screen {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 72px);
    }

    .bg-circuit,
    .bg-sprites,
    .top-flags,
    .fox-mascot {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .bg-circuit {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.16;
      z-index: 0;
    }

    .bg-sprites {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      z-index: 1;
    }

    .top-flags {
      width: 360px;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .fox-mascot {
      width: 240px;
      right: 55px;
      top: 95px;
      z-index: 2;
    }

    .welcomeCard {
      position: relative;
      z-index: 5;
    }

    @media (max-width: 1000px) {
      .fox-mascot {
        width: 180px;
        right: 15px;
        top: 90px;
        opacity: 0.9;
      }

      .top-flags {
        width: 260px;
        left: 50%;
      }
    }

    @media (max-width: 700px) {
      .fox-mascot {
        display: none;
      }

      .top-flags {
        width: 210px;
        left: 50%;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="topbar">
      <div class="tabs" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="windowBtns" aria-hidden="true">
        <i></i><i></i><i></i>
      </div>
    </header>

    <main class="screen">

      <img src="assets/background_circuit_blobs.svg" class="bg-circuit" alt="">
      <img src="assets/login_decor_sprites.svg" class="bg-sprites" alt="">
      <img src="assets/floating_flags.svg" class="top-flags" alt="">
      <img src="assets/side_mascot_hacker_fox.svg" class="fox-mascot" alt="">

      <section class="welcomeCard">
        <h2 style="margin-top:0; font-size:32px; font-weight:900;">
          Log In
        </h2>

        <p class="welcomeText">Welcome back! Sign in to continue.</p>

        <button class="google-btn" id="googleBtn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
          Continue as a student
        </button>
        <button class="google-btn" id="googleBtn1">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
          Continue as a teacher
        </button>

        <p id="statusMsg"></p>

        <p style="margin-top:24px; font-size:14px; color:#555;">
          Your Google display name will be used as your player name.
        </p>
      </section>
    </main>
  </div>

  <script type="module">
    import { signInWithGoogle, signInWithGoogleTeacher, getUser } from './firebase.js';

    const statusMsg = document.getElementById("statusMsg");

    document.getElementById("googleBtn").addEventListener("click", async () => {
      statusMsg.textContent = "";

      try {
        const user = await signInWithGoogle();

        localStorage.setItem("playerName", user.displayName || user.email.split("@")[0]);
        localStorage.setItem("userEmail", user.email);
        localStorage.setItem("uid", user.uid);

        console.log("Logged in as:", user.displayName, user.uid);
        window.location.href = "join.html";

      } catch (error) {6
        if (error.code === "auth/popup-closed-by-user") {
          statusMsg.textContent = "Sign-in cancelled. Please try again.";
        } else if (error.code === "auth/popup-blocked") {
          statusMsg.textContent = "Popup was blocked. Please allow popups for this site.";
        } else {
          statusMsg.textContent = "Sign-in failed. Please try again.";
          console.error("Google sign-in error:", error.code, error.message);
        }
      }
    });

    document.getElementById("googleBtn1").addEventListener("click", async () => {
      statusMsg.textContent = "";

      try {
        const user = await signInWithGoogleTeacher();

        localStorage.setItem("playerName", user.displayName || user.email.split("@")[0]);
        localStorage.setItem("userEmail", user.email);
        localStorage.setItem("uid", user.uid);

        console.log("Logged in as:", user.displayName, user.uid);

        const dbUser = await getUser(user.uid);
        if (dbUser.role !== "student") {
          window.location.href = "teacher.html";
        } else {
          window.location.href = "join.html";
        }
        

      } catch (error) {6
        if (error.code === "auth/popup-closed-by-user") {
          statusMsg.textContent = "Sign-in cancelled. Please try again.";
        } else if (error.code === "auth/popup-blocked") {
          statusMsg.textContent = "Popup was blocked. Please allow popups for this site.";
        } else {
          statusMsg.textContent = "Sign-in failed. Please try again.";
          console.error("Google sign-in error:", error.code, error.message);
        }
      }
    });
  </script>
</body>
</html>
