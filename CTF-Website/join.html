<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Join Session – Capture the Flag</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .screen {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 72px);
    }

    .bg-circuit,
    .bg-sprites,
    .top-flags,
    .fox-mascot {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .bg-circuit {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.16;
      z-index: 0;
    }

    .bg-sprites {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      z-index: 1;
    }

    .top-flags {
      width: 360px;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .fox-mascot {
      width: 190px;
      right: 65px;
      top: 105px;
      z-index: 2;
    }

    .welcomeCard {
      position: relative;
      z-index: 5;
    }

    #sessionPin {
      font-size: 24px;
      padding: 15px;
      border: 4px solid #000;
      width: 100%;
      max-width: 300px;
      margin: 20px auto;
      display: block;
      text-align: center;
      letter-spacing: 4px;
      font-weight: 900;
    }

    @media (max-width: 1000px) {
      .fox-mascot {
        width: 145px;
        right: 10px;
        top: 95px;
        opacity: 0.9;
      }

      .top-flags {
        width: 260px;
        left: 50%;
      }
    }

    @media (max-width: 700px) {
      .fox-mascot {
        display: none;
      }

      .top-flags {
        width: 210px;
        left: 50%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="tabs" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="windowBtns" aria-hidden="true">
        <i></i><i></i><i></i>
      </div>
    </header>

    <main class="screen">

      <img src="assets/background_circuit_blobs.svg" class="bg-circuit" alt="">
      <img src="assets/login_decor_sprites.svg" class="bg-sprites" alt="">
      <img src="assets/floating_flags.svg" class="top-flags" alt="">
      <img src="assets/side_mascot_hacker_fox.svg" class="fox-mascot" alt="">

      <section class="welcomeCard">
        <h2 style="margin-top:0; font-size:32px; font-weight:900;">
          Join Game Session
        </h2>

        <p class="welcomeText" style="margin:20px 0;">
          Enter the PIN your teacher gave you
        </p>

        <form id="joinForm">
          <input
            type="text"
            id="sessionPin"
            placeholder="Session PIN"
            required
            maxlength="6"
          />

          <button class="startBig" type="submit">
            Join Session
          </button>
        </form>

        <p style="margin-top:24px; font-size:16px; color:#333;">
          <a href="signin.html" style="color:#6c2bd9; font-weight:bold; text-decoration:underline;">
            Back to Sign In
          </a>
        </p>
      </section>
    </main>
  </div>

  <script type="module">
    import { getRoomByPin } from './firebase.js';

    document.getElementById("joinForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const pin = document.getElementById("sessionPin").value.trim();

      if (!pin || pin.length < 4) {
        alert("Please enter a valid PIN!");
        return;
      }

      try {
        const room = await getRoomByPin(pin);

        if (!room) {
          alert("PIN not found! Ask your teacher for the correct PIN.");
          return;
        }

        localStorage.setItem("sessionPin", pin);
        localStorage.setItem("roomId", room.roomId);

        window.location.href = "team-select.html";

      } catch (error) {
        console.error("Error looking up PIN:", error);
        alert("Something went wrong. Please try again.");
      }
    });
  </script>
</body>
</html>
