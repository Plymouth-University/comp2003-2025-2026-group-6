<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Generate Questions – Capture the Flag</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    .screen {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 72px);
    }

    .bg-circuit,
    .bg-sprites,
    .top-flags,
    .fox-mascot {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .bg-circuit {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.16;
      z-index: 0;
    }

    .bg-sprites {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.28;
      z-index: 1;
    }

    .top-flags {
      width: 360px;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
    }

    .fox-mascot {
      width: 185px;
      right: 60px;
      top: 100px;
      z-index: 2;
    }

    .welcomeCard,
    #container,
    #addButton,
    #editButton {
      position: relative;
      z-index: 5;
    }

    .generate-card {
      max-width: 900px;
      margin: 140px auto 0;
    }

    .generate-title {
      margin-top: 0;
      font-size: calc(36px * var(--font-scale));
      font-weight: 900;
      text-align: center;
      color: var(--text-main);
    }

    .generate-text {
      text-align: center;
      font-size: calc(20px * var(--font-scale));
      margin: 20px 0;
    }

    .confirm-btn {
      display: block;
      margin: 30px auto 0;
      font-size: calc(22px * var(--font-scale));
      padding: 18px 40px;
    }

    #topic {
      width: 100%;
      max-width: 650px;
      display: block;
      margin: 20px auto;
      padding: 16px;
      font-size: calc(18px * var(--font-scale));
      border: 4px solid var(--card-border);
      border-radius: 10px;
      resize: vertical;
      background: var(--button-bg);
      color: var(--button-text);
    }

    #file-input {
      display: block;
      margin: 20px auto;
      font-size: calc(16px * var(--font-scale));
      color: var(--text-main);
    }

    #loading {
      text-align: center;
      font-size: calc(20px * var(--font-scale));
      margin-top: 24px;
      color: var(--text-main);
    }

    #container {
      max-width: 950px;
      margin: 30px auto;
      color: var(--text-main);
    }

    #container textarea {
      background: var(--button-bg);
      color: var(--button-text);
      border: 3px solid var(--card-border);
      border-radius: 8px;
      padding: 10px;
      font-size: calc(16px * var(--font-scale));
    }

    #qNum,
    #aNum,
    #cNum {
      color: var(--text-light);
      font-size: calc(18px * var(--font-scale));
      font-weight: 900;
      margin: 12px 0 6px;
    }

    #addButton,
    #editButton {
      margin: 20px 10px 50px;
      padding: 14px 28px;
      font-size: calc(18px * var(--font-scale));
      font-weight: 800;
      border: 4px solid var(--button-border);
      border-radius: 10px;
      cursor: pointer;
    }

    #addButton {
      margin-left: calc(50% - 150px);
      background: #ff9800;
      color: white;
    }

    #editButton {
      background: #4caf50;
      color: white;
    }

    @media (max-width: 1000px) {
      .fox-mascot {
        width: 145px;
        right: 10px;
        top: 90px;
        opacity: 0.9;
      }

      .top-flags {
        width: 250px;
      }
    }

    @media (max-width: 700px) {
      .fox-mascot {
        display: none;
      }

      .top-flags {
        width: 210px;
      }

      .generate-card {
        margin-top: 130px;
      }
    }
  </style>
</head>

<body>

  <div id="accessibilityWidget">
  <button id="accessibilityToggle" aria-label="Open accessibility settings">
    ⚙️ Accessibility
  </button>

  <div id="accessibilityPanel" hidden>
    <button id="themeToggle" aria-label="Toggle dark mode">
      🌙 Dark mode
    </button>

    <button id="contrastToggle" aria-label="Toggle high contrast">
  High contrast
</button>

    <div class="font-row">
      <span>Text size</span>
      <button id="fontDown" aria-label="Decrease text size">A-</button>
      <button id="fontUp" aria-label="Increase text size">A+</button>
    </div>
  </div>
</div>

  <div class="app">
    <header class="topbar">
      <div class="tabs" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="windowBtns" aria-hidden="true">
        <i></i><i></i><i></i>
      </div>
    </header>

    <main class="screen">

      <img src="assets/background_circuit_blobs.svg" class="bg-circuit" alt="">
      <img src="assets/login_decor_sprites.svg" class="bg-sprites" alt="">
      <img src="assets/floating_flags.svg" class="top-flags" alt="">
      <img src="assets/side_mascot_hacker_fox.svg" class="fox-mascot" alt="">

      <section class="welcomeCard generate-card">
        <h2 class="generate-title">
          Generate Questions
        </h2>

        <p class="welcomeText generate-text">
          Input your topic of choice and press generate:
        </p>

        <textarea id="topic" rows="4" placeholder="Enter topic..."></textarea>

        <button id="generateBtn" class="startBig confirm-btn" disabled>
          Generate
        </button>

        <h2 id="loading" style="visibility:hidden;">
          Questions are generating - this could take a minute...
        </h2>

        <p class="welcomeText generate-text">
          Upload question pack to edit:
        </p>

        <input type="file" id="file-input" accept=".json">
      </section>

      <template id="itemTemplate">
        <div id="qNum">Q</div>
        <div class="item">
          <textarea id="Q" rows="1" cols="100"></textarea>
        </div>

        <div id="aNum">A</div>
        <textarea id="A" rows="2" cols="40"></textarea>
        <textarea id="B" rows="2" cols="40"></textarea>
        <textarea id="C" rows="2" cols="40"></textarea>
        <textarea id="D" rows="2" cols="40"></textarea>

        <div id="cNum">C</div>
        <div class="item">
          <textarea id="Correct" rows="1" cols="100"></textarea>
        </div>

        <br><br>
      </template>

      <div id="container"></div>

      <button id="addButton">Add Question</button>
      <button id="editButton">Save</button>
    </main>
  </div>

  <script src="theme.js"></script>

  <script>
    const getTopic = document.getElementById("topic");
    const generateBtn = document.getElementById("generateBtn");

    getTopic.addEventListener("input", () => {
      generateBtn.disabled = getTopic.value.trim() === "";
    });
  </script>

  <script>
    const clickSound = new Audio("assets/click.wav");
    const confirmSound = new Audio("assets/confirm.wav");

    function playSound(sound) {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }

    document.addEventListener("DOMContentLoaded", () => {
      const addBtn = document.getElementById("addButton");
      const saveBtn = document.getElementById("editButton");

      addBtn.addEventListener("click", () => {
        playSound(clickSound);
      });

      saveBtn.addEventListener("click", () => {
        playSound(confirmSound);
      });
    });
  </script>

  <script type="module" src="question-generation.js"></script>
</body>
</html>
